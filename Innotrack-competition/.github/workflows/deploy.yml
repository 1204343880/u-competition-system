name: Build and Deploy InnoTrack

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: innotrack-app
  NGINX_IMAGE_NAME: innotrack-nginx

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    outputs:
      app_image: ${{ steps.images.outputs.app_image }}
      nginx_image: ${{ steps.images.outputs.nginx_image }}
      app_image_latest: ${{ steps.images.outputs.app_image_latest }}
      nginx_image_latest: ${{ steps.images.outputs.nginx_image_latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="${{ github.sha }}"
          APP_IMAGE="${{ env.REGISTRY }}/${OWNER}/${{ env.APP_IMAGE_NAME }}:${SHA_TAG}"
          NGINX_IMAGE="${{ env.REGISTRY }}/${OWNER}/${{ env.NGINX_IMAGE_NAME }}:${SHA_TAG}"
          APP_IMAGE_LATEST="${{ env.REGISTRY }}/${OWNER}/${{ env.APP_IMAGE_NAME }}:latest"
          NGINX_IMAGE_LATEST="${{ env.REGISTRY }}/${OWNER}/${{ env.NGINX_IMAGE_NAME }}:latest"
          echo "app_image=${APP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${NGINX_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "app_image_latest=${APP_IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "nginx_image_latest=${NGINX_IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend jar
        run: mvn -B clean package -Dmaven.test.skip=true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: innotrack-ui/package-lock.json

      - name: Build frontend dist
        working-directory: innotrack-ui
        run: |
          npm ci
          npm run build:prod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: |
            ${{ steps.images.outputs.app_image }}
            ${{ steps.images.outputs.app_image_latest }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ${{ steps.images.outputs.nginx_image }}
            ${{ steps.images.outputs.nginx_image_latest }}

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Upload production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_DEPLOY_DIR || '/opt/innotrack' }}

      - name: Pull images and restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.build-and-push.outputs.app_image }}
          NGINX_IMAGE: ${{ needs.build-and-push.outputs.nginx_image }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_DIR: ${{ secrets.SERVER_DEPLOY_DIR || '/opt/innotrack' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: APP_IMAGE,NGINX_IMAGE,GHCR_USERNAME,GHCR_TOKEN,DEPLOY_DIR
          script: |
            set -e
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ ! -f .env ]; then
              echo "Missing $DEPLOY_DIR/.env. Create it before deploying." >&2
              exit 1
            fi

            printf 'APP_IMAGE=%s\nNGINX_IMAGE=%s\n' "$APP_IMAGE" "$NGINX_IMAGE" > .ci-images.env

            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker compose --env-file .env --env-file .ci-images.env -f docker-compose.prod.yml pull
            docker compose --env-file .env --env-file .ci-images.env -f docker-compose.prod.yml up -d
            docker image prune -f
            docker compose --env-file .env --env-file .ci-images.env -f docker-compose.prod.yml ps
