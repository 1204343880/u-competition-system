<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="/favicon.png">
  <title>%VITE_APP_TITLE%</title>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; }
    body {
      overflow: hidden;
      background: #f7f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #loader-wrapper {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(175deg, #ffffff 0%, #f8f9fb 55%, #f2f4f7 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 220ms ease-out, visibility 0s linear 220ms;
    }
    #loader-wrapper.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #loader-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 42%, rgba(26,115,232,.035), transparent 32%);
    }

    .loader-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader-copy {
      margin-top: 16px;
      color: #73777f;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .08em;
      line-height: 1.5;
    }

    .mobius-stage {
      position: relative;
      width: 240px;
      height: 150px;
      perspective: 800px;
    }
    .mobius-3d {
      position: absolute;
      inset: 16px 0 auto;
      z-index: 2;
      width: 240px;
      height: 118px;
      transform-style: preserve-3d;
      animation: ring-spin 4.5s cubic-bezier(.45,.05,.35,.95) infinite;
    }
    .mobius-ribbon { display: block; width: 100%; height: 100%; overflow: visible; }

    .ribbon-volume,
    .ribbon-outline,
    .ribbon-centerline,
    .ribbon-cutout,
    .ribbon-front,
    .ribbon-front-outline,
    .ribbon-highlight,
    .energy-flow {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .ribbon-volume { stroke: #626871; stroke-width: 12; opacity: .055; }
    .ribbon-outline { stroke: #626871; stroke-width: 2.05; opacity: .5; filter: url(#pencil-soft); }
    .ribbon-centerline { stroke: #8f959d; stroke-width: .7; opacity: .28; }
    .ribbon-cutout { stroke: #f9fafb; stroke-width: 15; opacity: .98; }
    .ribbon-front { stroke: #626871; stroke-width: 12; opacity: .055; }
    .ribbon-front-outline { stroke: #626871; stroke-width: 2.05; opacity: .5; filter: url(#pencil-soft); }
    .ribbon-highlight { stroke: #ffffff; stroke-width: .8; opacity: .78; }
    .energy-flow { stroke-width: 2.05; filter: url(#energy-glow); }
    .energy-gold {
      stroke: #1a73e8;
      stroke-dasharray: 25 175;
      animation: energy-run 2.2s cubic-bezier(.4,0,.2,1) infinite;
    }
    .energy-orange {
      stroke: #78a7ea;
      stroke-width: 2;
      stroke-dasharray: 18 182;
      stroke-dashoffset: -88;
      animation: energy-run 2.2s cubic-bezier(.4,0,.2,1) infinite;
    }

    @keyframes ring-spin {
      0%,100% { transform: rotateX(6deg) rotateY(-11deg) rotateZ(-.8deg); }
      50% { transform: rotateX(-6deg) rotateY(11deg) rotateZ(.8deg); }
    }
    @keyframes energy-run { to { stroke-dashoffset: -200; } }

    @media (max-width:520px) {
      .mobius-stage { transform:scale(.86); }
    }
    @media (prefers-reduced-motion:reduce) {
      .mobius-3d,.energy-flow { animation:none; }
    }
  </style>
</head>

<body>
  <div id="loader-wrapper" role="status" aria-live="polite" aria-label="正在加载资源">
    <div class="loader-content">
      <div class="mobius-stage">
      <div class="mobius-3d">
        <svg class="mobius-ribbon" viewBox="0 0 240 118" aria-hidden="true">
          <defs>
            <filter id="pencil-soft" x="-20%" y="-30%" width="140%" height="160%"><feGaussianBlur stdDeviation=".16"/></filter>
            <filter id="energy-glow" x="-40%" y="-70%" width="180%" height="240%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <path class="ribbon-volume" d="M120 59C96 28 70 20 44 29C11 40 16 84 46 94C77 104 102 81 120 59C139 35 167 19 197 29C229 40 225 84 197 95C166 107 139 84 120 59"/>
          <path class="ribbon-outline" d="M120 59C96 28 70 20 44 29C11 40 16 84 46 94C77 104 102 81 120 59C139 35 167 19 197 29C229 40 225 84 197 95C166 107 139 84 120 59"/>
          <path class="ribbon-centerline" d="M120 59C96 28 70 20 44 29C11 40 16 84 46 94C77 104 102 81 120 59C139 35 167 19 197 29C229 40 225 84 197 95C166 107 139 84 120 59"/>
          <path class="energy-flow energy-gold" pathLength="200" d="M120 59C96 28 70 20 44 29C11 40 16 84 46 94C77 104 102 81 120 59C139 35 167 19 197 29C229 40 225 84 197 95C166 107 139 84 120 59"/>
          <path class="energy-flow energy-orange" pathLength="200" d="M120 59C96 28 70 20 44 29C11 40 16 84 46 94C77 104 102 81 120 59C139 35 167 19 197 29C229 40 225 84 197 95C166 107 139 84 120 59"/>
          <path class="ribbon-cutout" d="M87 31C102 37 112 49 120 59C130 72 140 85 154 92"/>
          <path class="ribbon-front" d="M87 31C102 37 112 49 120 59C130 72 140 85 154 92"/>
          <path class="ribbon-front-outline" d="M87 31C102 37 112 49 120 59C130 72 140 85 154 92"/>
          <path class="ribbon-highlight" d="M88 28C103 35 113 47 121 57C132 71 141 82 155 89"/>
        </svg>
      </div>
      </div>
      <p class="loader-copy">资源加载中</p>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
