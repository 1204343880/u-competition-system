# Docker环境配置
server:
  port: 8080

spring:
  datasource:
    druid:
      master:
        url: jdbc:mysql://mysql:3306/ruoyidemo?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false
        username: root
        password: ${MYSQL_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: ${MQ_PASSWORD}
    connection-timeout: 10s
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000ms
          max-attempts: 3
        acknowledge-mode: auto
        missing-queues-fatal: false
        concurrency: 1
        max-concurrency: 3
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

ruoyi:
  profile: /home/ruoyi/uploadPath
